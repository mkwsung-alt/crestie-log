// ── AGE CALCULATOR
function calcAge(birthDateStr) {
  if (!birthDateStr || birthDateStr==="unknown") return null;
  const birth = new Date(birthDateStr + "T00:00:00");
  if (isNaN(birth)) return null;
  const now = new Date();
  let years = now.getFullYear() - birth.getFullYear();
  let months = now.getMonth() - birth.getMonth();
  let days = now.getDate() - birth.getDate();
  if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
  if (months < 0) { years--; months += 12; }
  if (years > 0) return `${years}년 ${months}개월`;
  if (months > 0) return `${months}개월 ${days}일`;
  return `${days}일`;
}

// ── RANGE CHART
function RangeChart({ data, colorHigh, colorLow, unit, height=80 }) {
  const allVals = data.flatMap(d=>[d.lo,d.hi]).filter(v=>v!=null&&v!=="").map(Number);
  if (!allVals.length) return (
    <div style={{fontSize:12,color:C.textMuted,textAlign:"center",padding:"14px 0",fontFamily:FB}}>
      아직 기록된 데이터가 없어요
    </div>
  );
  const minV = Math.min(...allVals)-2, maxV = Math.max(...allVals)+2;
  const range = maxV-minV||1;
  const w = 100/data.length;
  const toY = (v) => ((maxV-Number(v))/range)*height;
  return (
    <svg width="100%" height={height} style={{overflow:"visible",display:"block"}}>
      {data.map((d,i) => {
        const hasLo = d.lo!=null&&d.lo!=="";
        const hasHi = d.hi!=null&&d.hi!=="";
        if (!hasLo&&!hasHi) return null;
        const xPct = `${(i+0.5)*w}%`;
        const yHi = hasHi?toY(d.hi):null;
        const yLo = hasLo?toY(d.lo):null;
        return (
          <g key={i}>
            {hasLo&&hasHi&&<line x1={xPct} y1={yHi} x2={xPct} y2={yLo} stroke={colorLow} strokeWidth={3} strokeLinecap="round" opacity={0.3}/>}
            {hasHi&&<circle cx={xPct} cy={yHi} r={4} fill={colorHigh}/>}
            {hasLo&&<circle cx={xPct} cy={yLo} r={4} fill={colorLow}/>}
          </g>
        );
      })}
      <text x="3" y={height-3} fontSize="9" fill={C.textMuted}>{Math.round(minV+2)}{unit}</text>
      <text x="3" y={11} fontSize="9" fill={C.textMuted}>{Math.round(maxV-2)}{unit}</text>
    </svg>
  );
}

function DiaryView({ lizards, logs, photoUrls, activeLizard }) {
  const [selYear, setSelYear] = useState(new Date().getFullYear());
  const [selMonth, setSelMonth] = useState(new Date().getMonth());

  const daysInMonth = getDaysInMonth(selYear, selMonth);
  const entries = Array.from({length:daysInMonth},(_,i)=>{
    const dkey = `${selYear}-${String(selMonth+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`;
    const lg = activeLizard ? getLog(logs, activeLizard.id, dkey) : emptyLog();
    const urls = (photoUrls && photoUrls[activeLizard.id] && photoUrls[activeLizard.id][dkey]) || [];
    return { dkey, memo: lg.memo||"", photos: urls };
  }).filter(e => e.memo || e.photos.length>0).reverse();

  const prevM = () => { if(selMonth===0){setSelMonth(11);setSelYear(y=>y-1);}else setSelMonth(m=>m-1); };
  const nextM = () => { if(selMonth===11){setSelMonth(0);setSelYear(y=>y+1);}else setSelMonth(m=>m+1); };

  return (
    <div style={{padding:"4px 16px 8px",fontFamily:FB}}>
      {/* nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0 16px"}}>
        <button onClick={prevM} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.textMuted,padding:"0 6px",lineHeight:1}}>‹</button>
        <div style={{fontFamily:FT,fontSize:20,color:C.text}}>{selYear}년 {MONTHS[selMonth]}</div>
        <button onClick={nextM} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.textMuted,padding:"0 6px",lineHeight:1}}>›</button>
      </div>

      {entries.length === 0 ? (
        <div style={{textAlign:"center",padding:"60px 0",color:C.textMuted}}>
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke={C.border} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom:12}}>
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <div style={{fontSize:14}}>이 달의 메모가 없어요</div>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {entries.map(({dkey, memo, photos})=>{
            const [y,m,d] = dkey.split("-").map(Number);
            const wd = WEEKDAYS[new Date(y,m-1,d).getDay()];
            return (
              <div key={dkey} style={{background:C.surface,borderRadius:8,boxShadow:C.shadow,border:`1px solid ${C.border}`,overflow:"hidden"}}>
                {photos.length>0 && (
                  <div style={{display:"grid",gridTemplateColumns:photos.length>1?"1fr 1fr":"1fr",gap:4}}>
                    {photos.map((src,i)=>(
                      <img key={i} src={src} alt="" style={{width:"100%",height:photos.length>1?120:180,objectFit:"cover",display:"block"}}
                        onError={e=>{e.target.style.display="none";}}/>
                    ))}
                  </div>
                )}
                <div style={{padding:"14px 16px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                    <div style={{fontFamily:FT,fontSize:15,color:C.accentDark}}>{m}월 {d}일</div>
                    <div style={{fontSize:11,color:C.textMuted}}>{wd}요일</div>
                    {activeLizard && <div style={{fontSize:11,color:C.textMuted,marginLeft:"auto"}}>{activeLizard.name}</div>}
                  </div>
                  {memo && <div style={{fontSize:14,color:C.text,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{memo}</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── CALENDAR VIEW
function CalendarView({ lizards, logs, photoUrls, activeLizard, onUpdate, onUploadPhotos, onDeletePhoto, calYear, calMonth, prevMonth, nextMonth, setLizards }) {
  const [detailDk, setDetailDk] = useState(null);
  const daysInMonth = getDaysInMonth(calYear, calMonth);
  const firstDay = getFirstDay(calYear, calMonth);
  const cells = [...Array(firstDay).fill(null), ...Array.from({length:daysInMonth},(_,i)=>i+1)];
  const todayLog = activeLizard ? getLog(logs, activeLizard.id, todayKey) : emptyLog();
  const QUICK = [{key:"food",label:"밥"},{key:"water",label:"물"},{key:"feces",label:"배변"},{key:"urine",label:"소변"},{key:"shed",label:"탈피"}];

  const getDots = (dkey) => lizards.map((l,i)=>{
    const lg = getLog(logs,l.id,dkey);
    const hasActivity = lg.urine||lg.feces||lg.food||lg.water||lg.shed||lg.memo||(lg.photos&&lg.photos.length>0)||lg.photo;
    return hasActivity ? DOT_COLORS[i%DOT_COLORS.length] : null;
  }).filter(Boolean);

  return (
    <div style={{fontFamily:FB,paddingBottom:8}}>
      {/* month nav */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 22px 10px"}}>
        <button onClick={prevMonth} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.textMuted,padding:"4px 8px",lineHeight:1}}>‹</button>
        <div style={{fontFamily:FT,fontSize:22,color:C.text}}>{calYear}년 {MONTHS[calMonth]}</div>
        <button onClick={nextMonth} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.textMuted,padding:"4px 8px",lineHeight:1}}>›</button>
      </div>
      {/* weekday row */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 14px",marginBottom:4}}>
        {WEEKDAYS.map((w,i)=>(
          <div key={w} style={{textAlign:"center",fontSize:11,fontWeight:600,color:i===0?C.red:i===6?C.blue:C.textMuted,padding:"4px 0"}}>{w}</div>
        ))}
      </div>
      {/* day cells */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 14px",gap:"2px 0"}}>
        {cells.map((day,idx)=>{
          if (!day) return <div key={`e${idx}`}/>;
          const dkey = `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const isT = dkey===todayKey, dow = idx%7, isSel = dkey===detailDk;
          const dots = getDots(dkey);
          return (
            <div key={dkey} onClick={()=>setDetailDk(dkey)}
              style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"6px 1px",cursor:"pointer",borderRadius:4,background:isSel?C.ivory:"transparent"}}>
              <span style={{fontSize:13,fontWeight:isT||isSel?700:400,color:isSel?C.text:dow===0?C.red:dow===6?C.blue:C.text,lineHeight:1.6,width:26,textAlign:"center",fontFamily:FT}}>{day}</span>
              {isT
                ? <div style={{width:12,height:2,background:C.text,borderRadius:1,marginTop:2}}/>
                : <div style={{display:"flex",gap:2,minHeight:5,justifyContent:"center",marginTop:2}}>
                    {dots.map((c,i)=><div key={i} style={{width:4,height:4,borderRadius:"50%",background:c}}/>)}
                  </div>
              }
              {isT&&dots.length>0&&(
                <div style={{display:"flex",gap:2,justifyContent:"center",marginTop:1}}>
                  {dots.map((c,i)=><div key={i} style={{width:4,height:4,borderRadius:"50%",background:c}}/>)}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* today card */}
      {activeLizard&&(
        <div style={{margin:"16px 20px 0",background:C.surface,borderRadius:8,boxShadow:C.shadow,overflow:"hidden",border:`1px solid ${C.border}`}}>
          <div style={{padding:"13px 18px 10px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontFamily:FT,fontSize:15,fontWeight:600,color:C.text,letterSpacing:"0.01em"}}>오늘 · {activeLizard.name}</div>
            <button onClick={()=>setDetailDk(todayKey)}
              style={{fontSize:11,color:C.textMuted,background:"none",border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 10px",cursor:"pointer",fontFamily:FB,letterSpacing:"0.03em"}}>
              기록 열기
            </button>
          </div>
          <div style={{display:"flex",gap:5,padding:"10px 14px 12px"}}>
            {QUICK.map((it,i)=>{
              const on=todayLog[it.key];
              const activeBg = i%2===0 ? C.text : C.accentDark;
              return(
                <div key={it.key} onClick={()=>onUpdate(activeLizard.id,todayKey,{[it.key]:!on})}
                  style={{flex:1,padding:"9px 3px",borderRadius:5,background:on?activeBg:C.ivory,cursor:"pointer",textAlign:"center",border:`1px solid ${on?activeBg:C.border}`,transition:"all 0.15s"}}>
                  <div style={{fontSize:11,fontWeight:on?600:400,color:on?"#fff":C.textMuted,fontFamily:FT}}>{it.label}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* legend */}
      {lizards.length>1&&(
        <div style={{margin:"12px 20px 0",display:"flex",gap:12,flexWrap:"wrap"}}>
          {lizards.map((l,i)=>(
            <div key={l.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.textMuted}}>
              <div style={{width:6,height:6,borderRadius:"50%",background:DOT_COLORS[i%DOT_COLORS.length]}}/>
              {l.name}
            </div>
          ))}
        </div>
      )}
      {detailDk&&activeLizard&&(
        <DetailPanel dkey={detailDk} activeLizard={activeLizard} logs={logs} onUpdate={onUpdate} onClose={()=>setDetailDk(null)} setLizards={setLizards} photoUrls={photoUrls} onUploadPhotos={onUploadPhotos} onDeletePhoto={onDeletePhoto}/>
      )}
    </div>
  );
}

// ── STATS VIEW
function StatsView({ lizards, logs, activeLizard, calYear, calMonth, prevMonth, nextMonth }) {
  const [period, setPeriod] = useState("month");
  const [weekBase, setWeekBase] = useState(todayKey);

  const statsMonthDays = Array.from({length:getDaysInMonth(calYear,calMonth)},(_,i)=>
    `${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(i+1).padStart(2,"0")}`
  );
  const statsWeekDays = getWeekDays(weekBase);
  const chartDays = period==="month"?statsMonthDays:statsWeekDays;
  const xLabels = period==="month"
    ? chartDays.map(d=>String(Number(d.split("-")[2])))
    : chartDays.map(d=>WEEKDAYS[new Date(d+"T00:00:00").getDay()]);

  const chartData = chartDays.map(dkey=>{
    const lg = activeLizard?getLog(logs,activeLizard.id,dkey):emptyLog();
    return {tempLo:lg.tempMin,tempHi:lg.tempMax,humLo:lg.humMin,humHi:lg.humMax};
  });
  const foodStats = (() => {
    const counts={};
    chartDays.forEach(dkey=>{
      const lg=activeLizard?getLog(logs,activeLizard.id,dkey):emptyLog();
      (lg.foodItems||[]).forEach(f=>{counts[f]=(counts[f]||0)+1;});
    });
    return Object.entries(counts).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
  })();

  const weekDays = getWeekDays(weekBase);
  const wStart = new Date(weekDays[0]+"T00:00:00"), wEnd = new Date(weekDays[6]+"T00:00:00");
  const fmt = d=>`${d.getMonth()+1}/${d.getDate()}`;
  const prevWeek=()=>{const d=new Date(weekBase+"T00:00:00");d.setDate(d.getDate()-7);setWeekBase(toDk(d));};
  const nextWeek=()=>{const d=new Date(weekBase+"T00:00:00");d.setDate(d.getDate()+7);setWeekBase(toDk(d));};

  const card = {background:C.surface,borderRadius:8,padding:"18px 18px 14px",marginBottom:12,boxShadow:C.shadow,border:`1px solid ${C.border}`};
  const cardTitle = {fontFamily:FT,fontSize:16,color:C.text,marginBottom:14,display:"flex",alignItems:"center",gap:6};
  const legRow = {display:"flex",gap:14,marginTop:10};
  const legItem = () => ({display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.textMuted});
  const legDot = (color) => ({width:7,height:7,borderRadius:"50%",background:color,flexShrink:0});

  // 히트맵 항목 정의
  const HEAT_ITEMS = [
    {key:"urine",  label:"소변", color:"#c9a84c"},
    {key:"feces",  label:"배변", color:"#8b6340"},
    {key:"food",   label:"밥",   color:"#4d7a52"},
    {key:"water",  label:"물",   color:"#4a82aa"},
    {key:"shed",   label:"탈피", grad:true},
  ];

  // 히트맵용 월 달력 데이터
  const hmDays = statsMonthDays;
  const hmFirstDay = getFirstDay(calYear, calMonth);
  const hmCells = [...Array(hmFirstDay).fill(null), ...Array.from({length:getDaysInMonth(calYear,calMonth)},(_,i)=>i+1)];

  return (
    <div style={{padding:"4px 16px 8px",fontFamily:FB}}>
      {/* period + nav row */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0 12px"}}>
        {period==="month"?(
          <div style={{display:"flex",alignItems:"center",gap:2}}>
            <button onClick={prevMonth} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.textMuted,padding:"0 6px",lineHeight:1}}>‹</button>
            <span style={{fontFamily:FT,fontSize:18,color:C.text,minWidth:80,textAlign:"center"}}>{calYear}년 {MONTHS[calMonth]}</span>
            <button onClick={nextMonth} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.textMuted,padding:"0 6px",lineHeight:1}}>›</button>
          </div>
        ):(
          <div style={{display:"flex",alignItems:"center",gap:2}}>
            <button onClick={prevWeek} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.textMuted,padding:"0 6px",lineHeight:1}}>‹</button>
            <span style={{fontFamily:FT,fontSize:16,color:C.text,minWidth:100,textAlign:"center"}}>{fmt(wStart)} – {fmt(wEnd)}</span>
            <button onClick={nextWeek} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.textMuted,padding:"0 6px",lineHeight:1}}>›</button>
          </div>
        )}
        <div style={{display:"flex",background:C.surface,borderRadius:4,padding:2,border:`1px solid ${C.border}`}}>
          {[{v:"month",l:"월별"},{v:"week",l:"주간"}].map(({v,l})=>(
            <button key={v} onClick={()=>setPeriod(v)}
              style={{background:period===v?C.text:"transparent",color:period===v?"#fff":C.textMuted,border:"none",borderRadius:3,padding:"5px 14px",fontSize:12,cursor:"pointer",fontFamily:FB,fontWeight:period===v?600:400,transition:"all 0.15s"}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* ── 활동 히트맵 (월별일 때만) */}
      {period==="month" && activeLizard && (
        <div style={{...card, padding:"16px 14px 14px"}}>
          <div style={cardTitle}>활동 기록</div>
          {/* 요일 헤더 */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
            {WEEKDAYS.map((w,i)=>(
              <div key={w} style={{textAlign:"center",fontSize:9,fontWeight:600,color:i===0?C.red:i===6?C.blue:C.textMuted,padding:"2px 0"}}>{w}</div>
            ))}
          </div>
          {/* 날짜 그리드 */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"3px 2px"}}>
            {hmCells.map((day,idx)=>{
              if (!day) return <div key={`e${idx}`}/>;
              const dkey=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const lg=getLog(logs,activeLizard.id,dkey);
              const isT=dkey===todayKey;
              return(
                <div key={dkey} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"4px 1px",borderRadius:10,background:isT?"rgba(61,107,67,0.08)":"transparent"}}>
                  <span style={{fontSize:10,color:isT?C.accentDark:C.textMuted,fontWeight:isT?700:400,lineHeight:1.4,marginBottom:3}}>{day}</span>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2,marginTop:1}}>
                    {HEAT_ITEMS.map(item=>{
                      const on = lg[item.key];
                      if (!on) return null;
                      if (item.grad) return(
                        <div key={item.key} style={{width:5,height:5,borderRadius:"50%",background:"linear-gradient(135deg,#e879a0,#a855f7)"}}/>
                      );
                      return(
                        <div key={item.key} style={{width:5,height:5,borderRadius:"50%",background:item.color}}/>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
          {/* 범례 */}
          <div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:12,paddingTop:10,borderTop:`1px solid ${C.bg}`}}>
            {HEAT_ITEMS.map(item=>(
              <div key={item.key} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:C.textMuted}}>
                <div style={{
                  width:7,height:7,borderRadius:"50%",flexShrink:0,
                  background:item.grad?"linear-gradient(135deg,#e879a0,#a855f7)":item.color
                }}/>
                {item.label}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* 온도 */}
      <div style={card}>
        <div style={cardTitle}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.tempHigh} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
          </svg>
          온도 <span style={{fontSize:12,color:C.textMuted,fontFamily:FB,fontWeight:400}}>(°C)</span>
        </div>
        <RangeChart data={chartData.map(d=>({lo:d.tempLo,hi:d.tempHi}))} colorHigh={C.tempHigh} colorLow={C.tempLow} unit="°"/>
        <div style={{display:"flex",marginTop:6}}>{xLabels.map((l,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:C.textMuted}}>{l}</div>)}</div>
        <div style={legRow}>
          <div style={legItem()}><div style={legDot(C.tempHigh)}/>최고</div>
          <div style={legItem()}><div style={legDot(C.tempLow)}/>최저</div>
        </div>
      </div>

      {/* 습도 */}
      <div style={card}>
        <div style={cardTitle}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.humHigh} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
          </svg>
          습도 <span style={{fontSize:12,color:C.textMuted,fontFamily:FB,fontWeight:400}}>(%)</span>
        </div>
        <RangeChart data={chartData.map(d=>({lo:d.humLo,hi:d.humHi}))} colorHigh={C.humHigh} colorLow={C.humLow} unit="%"/>
        <div style={{display:"flex",marginTop:6}}>{xLabels.map((l,i)=><div key={i} style={{flex:1,textAlign:"center",fontSize:9,color:C.textMuted}}>{l}</div>)}</div>
        <div style={legRow}>
          <div style={legItem()}><div style={legDot(C.humHigh)}/>최고</div>
          <div style={legItem()}><div style={legDot(C.humLow)}/>최저</div>
        </div>
      </div>

      {/* 먹이 */}
      <div style={card}>
        <div style={cardTitle}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.accentDark} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
            <line x1="7" y1="2" x2="7" y2="11"/>
            <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>
          </svg>
          먹이 기록
        </div>
        <FoodBar items={foodStats}/>
      </div>
    </div>
  );
}

// ── MANAGE VIEW — passport cards shown directly, no list
function ManageView({ lizards, setLizards, activeLid, setActiveLid, onUploadLizardPhoto }) {
  const [newName, setNewName] = useState("");

  const addLizard = () => {
    if (!newName.trim()) return;
    const id = Date.now().toString();
    const newL = {id,name:newName.trim(),emoji:"🦎",foods:[],birthDate:"",adoptDate:"",gender:""};
    setLizards(prev=>[...prev,newL]);
    setNewName("");
    setActiveLid(id);
  };
  const removeLizard = (id) => {
    setLizards(prev=>prev.filter(l=>l.id!==id));
    if (activeLid===id) setActiveLid(lizards.find(l=>l.id!==id)?.id||"");
  };

  const inp = {flex:1,background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"10px 14px",fontSize:13,color:C.text,fontFamily:FT,outline:"none"};
  const btn = {background:C.text,color:"#fff",border:"none",borderRadius:4,padding:"10px 16px",fontSize:13,cursor:"pointer",fontFamily:FB,fontWeight:600,whiteSpace:"nowrap"};

  return (
    <div style={{padding:"4px 16px 8px",fontFamily:FB}}>
      <div style={{fontFamily:FT,fontSize:22,color:C.text,padding:"14px 0 14px"}}>가족 목록</div>
      {lizards.map(l => <InlinePassportCard key={l.id} lizard={l} setLizards={setLizards} onDelete={()=>removeLizard(l.id)} onUploadLizardPhoto={onUploadLizardPhoto}/>)}
      <div style={{display:"flex",gap:8,marginTop:4,paddingBottom:8}}>
        <input style={inp} placeholder="새 도마뱀 이름" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addLizard()}/>
        <button style={btn} onClick={addLizard}>+ 추가</button>
      </div>
    </div>
  );
}

// ── DATE INPUT COMPONENT
function DateInput({ value, onChange }) {
  const isUnknown = value === "unknown";
  const parts = (!isUnknown && value) ? value.split("-") : ["", "", ""];
  const [y, setY] = useState(parts[0]);
  const [m, setM] = useState(parts[1]);
  const [d, setD] = useState(parts[2]);

  const save = (ny, nm, nd) => {
    if (ny && nm && nd && ny.length >= 4) {
      onChange(`${ny.padStart(4,"0")}-${nm.padStart(2,"0")}-${nd.padStart(2,"0")}`);
    }
  };

  const numInp = {
    background:"#faf8f4", border:"1px solid #e2ddd4", borderRadius:4,
    padding:"5px 4px", fontSize:12, color:"#2c2417",
    fontFamily:"'Noto Sans KR',sans-serif", outline:"none",
    textAlign:"center", boxSizing:"border-box"
  };

  if (isUnknown) return (
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <span style={{fontSize:11,color:"#8c7f6e",fontFamily:"'Noto Sans KR',sans-serif"}}>불명</span>
      <button onClick={()=>onChange("")}
        style={{background:"none",border:"none",fontSize:10,color:"#b8aa98",cursor:"pointer",textDecoration:"underline",padding:0}}>취소</button>
    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:5}}>
      <div style={{display:"flex",alignItems:"center",gap:3}}>
        <input placeholder="년" value={y} maxLength={4}
          onChange={e=>{setY(e.target.value); save(e.target.value,m,d);}}
          style={{...numInp, width:"50px"}}/>
        <span style={{fontSize:11,color:"#b8aa98",flexShrink:0}}>/</span>
        <input placeholder="월" value={m} maxLength={2}
          onChange={e=>{setM(e.target.value); save(y,e.target.value,d);}}
          style={{...numInp, width:"28px"}}/>
        <span style={{fontSize:11,color:"#b8aa98",flexShrink:0}}>/</span>
        <input placeholder="일" value={d} maxLength={2}
          onChange={e=>{setD(e.target.value); save(y,m,e.target.value);}}
          style={{...numInp, width:"28px"}}/>
      </div>
      <button onClick={()=>onChange("unknown")}
        style={{background:"none",border:"none",fontSize:10,color:"#b8aa98",cursor:"pointer",textDecoration:"underline",padding:0,textAlign:"left",fontFamily:"'Noto Sans KR',sans-serif"}}>불명으로 설정</button>
    </div>
  );
}

// ── INLINE PASSPORT CARD
function InlinePassportCard({ lizard, setLizards, onDelete, onUploadLizardPhoto }) {
  const [editing, setEditing] = useState(false);
  const [newFood, setNewFood] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const upd = (patch) => setLizards(prev=>prev.map(l=>l.id===lizard.id?{...l,...patch}:l));
  const age = calcAge(lizard.birthDate);
  const GENDERS = [{val:"male",label:"수컷"},{val:"female",label:"암컷"},{val:"unknown",label:"불명"}];
  const genderLabel = {male:"♂ 수컷",female:"♀ 암컷",unknown:"성별 불명","":"성별 미입력"}[lizard.gender||""];

  const handlePhoto = (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    if(onUploadLizardPhoto) onUploadLizardPhoto(lizard.id, file);
  };
  const addFood = () => {
    const val=newFood.trim(); if(!val) return;
    upd({foods:[...(lizard.foods||[]),val]}); setNewFood("");
  };
  const removeFood = (f) => upd({foods:(lizard.foods||[]).filter(x=>x!==f)});

  const fieldLabel = {fontSize:10,fontWeight:700,color:C.textMuted,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5,display:"block"};
  const fieldVal = {fontSize:14,color:C.text,fontWeight:400};

  return (
    <div style={{background:C.surface,borderRadius:8,boxShadow:C.shadow,marginBottom:16,overflow:"hidden",fontFamily:FB,border:`1px solid ${C.border}`}}>

      {/* ── profile header — Daygram warm style */}
      <div style={{background:C.ivory,padding:"20px 18px 16px",borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          {/* photo + name */}
          <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
            <div style={{position:"relative",flexShrink:0}}>
              {lizard.photo?(
                <img src={lizard.photo} alt={lizard.name} style={{width:72,height:90,objectFit:"cover",borderRadius:6,border:`1px solid ${C.border}`,display:"block"}}/>
              ):(
                <div style={{width:72,height:90,borderRadius:6,background:C.surface,border:`1.5px dashed ${C.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
                  <span style={{fontSize:26}}>🦎</span>
                  <span style={{fontSize:8,color:C.textLight,letterSpacing:"0.1em"}}>PHOTO</span>
                </div>
              )}
              {editing&&(
                <label style={{position:"absolute",bottom:-6,right:-6,background:C.text,borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",border:`2px solid ${C.surface}`}}>
                  <span style={{fontSize:11,color:"#fff",lineHeight:1}}>＋</span>
                  <input type="file" accept="image/*" onChange={handlePhoto} style={{display:"none"}}/>
                </label>
              )}
            </div>
            <div style={{paddingTop:4}}>
              {editing?(
                <input value={lizard.name||""} onChange={e=>upd({name:e.target.value})}
                  style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 10px",fontSize:18,color:C.text,fontFamily:FT,outline:"none",width:"100%",boxSizing:"border-box",marginBottom:6}}/>
              ):(
                <div style={{fontFamily:FT,fontSize:22,fontWeight:600,color:C.text,lineHeight:1.1,marginBottom:4}}>{lizard.name}</div>
              )}
              {age&&<div style={{display:"inline-block",background:C.ivoryDark,borderRadius:4,padding:"2px 8px",fontSize:11,color:C.textMuted,marginBottom:4,fontFamily:FB}}>생후 {age}</div>}
              {lizard.adoptDate&&lizard.adoptDate!=="unknown"&&(()=>{
                const diff = Math.floor((new Date()-new Date(lizard.adoptDate+"T00:00:00"))/(1000*60*60*24));
                return diff>=0?(
                  <div style={{display:"block",fontSize:11,color:C.textMuted,fontFamily:FB,marginBottom:8}}>함께한 지 <span style={{fontWeight:600,color:C.accentDark}}>{diff.toLocaleString()}</span>일</div>
                ):null;
              })()}
              {editing?(
                <div style={{display:"flex",gap:5,marginTop:4}}>
                  {GENDERS.map(g=>(
                    <button key={g.val} onClick={()=>upd({gender:lizard.gender===g.val?"":g.val})}
                      style={{background:lizard.gender===g.val?C.text:C.surface,color:lizard.gender===g.val?"#fff":C.textMuted,border:`1px solid ${lizard.gender===g.val?C.text:C.border}`,borderRadius:4,padding:"4px 10px",fontSize:11,cursor:"pointer",fontFamily:FB}}>
                      {g.label}
                    </button>
                  ))}
                </div>
              ):(
                <div style={{fontSize:12,color:C.textMuted,fontFamily:FB}}>{genderLabel}</div>
              )}
            </div>
          </div>
          {/* buttons */}
          <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
            <button onClick={()=>setEditing(e=>!e)}
              style={{background:editing?C.text:C.surface,color:editing?"#fff":C.textMuted,border:`1px solid ${editing?C.text:C.border}`,borderRadius:4,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:FB,fontWeight:editing?600:400}}>

            <div key={key}>
              <div style={{fontSize:9,color:C.textLight,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4,fontFamily:FB}}>{label}</div>

                : <div style={{fontSize:12,color:C.text,fontFamily:FT}}>
                    {lizard[key]==="unknown"
                      ? <span style={{color:C.textMuted}}>불명</span>
                      : lizard[key]?lizard[key].replaceAll("-","."):<span style={{color:C.textLight}}>—</span>}
                  </div>
              }
            </div>
          ))}
        </div>
      </div>

      {/* ── bottom white section */}
      <div style={{padding:"16px 18px 18px"}}>
        <WeightSection lizard={lizard} upd={upd}/>
        <div style={{height:1,background:C.bg,margin:"16px 0"}}/>
        {/* foods */}
        <div style={{fontSize:11,fontWeight:700,color:C.textMuted,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:10}}>먹이 목록</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",minHeight:22,marginBottom:editing?10:0}}>
          {(lizard.foods||[]).map(f=>(
            <div key={f} style={{background:C.bg,borderRadius:20,padding:"5px 12px",fontSize:13,color:C.text,display:"flex",alignItems:"center",gap:5}}>
              {f}
              {editing&&<span onClick={()=>removeFood(f)} style={{color:C.textMuted,cursor:"pointer",fontSize:12,lineHeight:1}}>×</span>}
            </div>
          ))}
          {!(lizard.foods?.length)&&<span style={{fontSize:13,color:C.textMuted}}>등록된 먹이 없음</span>}
        </div>
        {editing&&(
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <input style={{flex:1,background:C.bg,border:"none",borderRadius:12,padding:"9px 14px",fontSize:13,color:C.text,fontFamily:FB,outline:"none"}}
              placeholder="먹이 추가 (예: 귀뚜라미)" value={newFood} onChange={e=>setNewFood(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addFood()}/>
            <button onClick={addFood} style={{background:C.accentDark,color:"#fff",border:"none",borderRadius:12,padding:"9px 16px",fontSize:13,cursor:"pointer",fontFamily:FB,fontWeight:600}}>추가</button>
          </div>
        )}

        {/* 삭제 버튼 — 하단 */}
        <div style={{marginTop:20,paddingTop:16,borderTop:`1px solid ${C.border}`}}>
          {confirmDelete ? (
            <div style={{background:C.ivory,borderRadius:8,padding:"14px 16px",textAlign:"center"}}>
              <div style={{fontSize:13,color:C.text,fontFamily:FT,marginBottom:12}}>정말로 삭제하시겠습니까?</div>
              <div style={{display:"flex",gap:8,justifyContent:"center"}}>
                <button onClick={()=>{setConfirmDelete(false);onDelete();}}
                  style={{background:C.red,color:"#fff",border:"none",borderRadius:4,padding:"7px 20px",fontSize:13,cursor:"pointer",fontFamily:FB,fontWeight:600}}>
                  네, 삭제합니다
                </button>
                <button onClick={()=>setConfirmDelete(false)}
                  style={{background:C.surface,color:C.textMuted,border:`1px solid ${C.border}`,borderRadius:4,padding:"7px 20px",fontSize:13,cursor:"pointer",fontFamily:FB}}>
                  아니오
                </button>
              </div>
            </div>
          ) : (
            <button onClick={()=>setConfirmDelete(true)}
              style={{background:"none",color:C.textLight,border:"none",fontSize:12,cursor:"pointer",fontFamily:FB,textDecoration:"underline",padding:0}}>
              이 개체 삭제
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── WEIGHT SECTION
function WeightSection({ lizard, upd }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const weights = lizard.weights||{};
  const mk = (y,m) => `${y}-${String(m+1).padStart(2,"0")}`;

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:C.textMuted,letterSpacing:"0.07em",textTransform:"uppercase"}}>몸무게 (g)</div>
        <div style={{display:"flex",alignItems:"center",gap:2}}>
          <button onClick={()=>setYear(y=>y-1)} style={{background:"none",border:"none",cursor:"pointer",color:C.accentDark,fontSize:16,padding:"0 6px",lineHeight:1}}>‹</button>
          <span style={{fontSize:13,color:C.text,minWidth:40,textAlign:"center",fontWeight:600}}>{year}</span>
          <button onClick={()=>setYear(y=>y+1)} style={{background:"none",border:"none",cursor:"pointer",color:C.accentDark,fontSize:16,padding:"0 6px",lineHeight:1}}>›</button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
        {Array.from({length:12},(_,m)=>{
          const key=mk(year,m);
          const val=weights[key]||"";
          const isThis=year===now.getFullYear()&&m===now.getMonth();
          return(
            <div key={m} style={{display:"flex",flexDirection:"column",gap:4}}>
              <div style={{fontSize:10,color:isThis?C.accentDark:C.textMuted,textAlign:"center",fontWeight:isThis?700:400}}>{m+1}월</div>
              <div style={{display:"flex",alignItems:"baseline",justifyContent:"center",background:isThis?C.accentDark+"18":C.bg,borderRadius:10,border:isThis?`1.5px solid ${C.accentLight}`:"none",padding:"7px 4px"}}>
                <input type="number" value={val} onChange={e=>upd({weights:{...weights,[key]:e.target.value}})} placeholder="—"
                  style={{background:"none",border:"none",fontSize:12,color:isThis?C.accentDark:C.text,fontFamily:FB,textAlign:"right",outline:"none",width:val?`${Math.max(String(val).length,1)*8}px`:"28px",minWidth:"16px",maxWidth:"100%",fontWeight:isThis?600:400,padding:0}}/>
                {val&&<span style={{fontSize:9,color:isThis?C.accentDark:C.textMuted,fontFamily:FB,marginLeft:1,flexShrink:0}}>g</span>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── FIREBASE HELPERS
async function fbSaveLizards(uid, lizards) {
  const stripped = lizards.map(l => {
    const { photo, ...rest } = l;
    return rest;
  });
  await db.collection('users').doc(uid).set({ lizards: stripped }, { merge: true });
}

async function fbSaveLizardPhoto(uid, lizardId, file) {
  if (!file) return null;
  const ref = storage.ref(`users/${uid}/lizards/${lizardId}/photo`);
  await ref.put(file);
  return await ref.getDownloadURL();
}

async function fbSaveLogs(uid, logs) {
  // Strip photos from logs (stored separately)
  const stripped = {};
  Object.entries(logs).forEach(([lid, days]) => {
    stripped[lid] = {};
    Object.entries(days).forEach(([dkey, log]) => {
      const { photos, photo, ...rest } = log;
      stripped[lid][dkey] = rest;
    });
  });
  await db.collection('users').doc(uid).set({ logs: stripped }, { merge: true });
}

async function fbSavePhoto(uid, lid, dkey, photoFile, index) {
  const ref = storage.ref(`users/${uid}/logs/${lid}/${dkey}/photo_${index}`);
  await ref.put(photoFile);
  return await ref.getDownloadURL();
}

async function fbDeletePhoto(uid, lid, dkey, index) {
  try {
    const ref = storage.ref(`users/${uid}/logs/${lid}/${dkey}/photo_${index}`);
    await ref.delete();
  } catch(e) {}
}

async function fbLoadAll(uid) {
  const doc = await db.collection('users').doc(uid).get();
  if (!doc.exists) return { lizards: [], logs: {} };
  const data = doc.data();
  return {
    lizards: data.lizards || [],
    logs: data.logs || {},
    photoUrls: data.photoUrls || {}
  };
}

async function fbSavePhotoUrl(uid, lid, dkey, urls) {
  await db.collection('users').doc(uid).set({
    photoUrls: { [lid]: { [dkey]: urls } }
  }, { merge: true });
}

// ── APP (Firebase version)
function App() {
  const [user, setUser] = useState(undefined); // undefined=loading, null=not logged in
  const [lizards, setLizards] = useState([]);
  const [logs, setLogs] = useState({});
  const [photoUrls, setPhotoUrls] = useState({}); // {lid: {dkey: [url,url,...]}}
  const [calYear, setCalYear] = useState(todayDate.getFullYear());
  const [calMonth, setCalMonth] = useState(todayDate.getMonth());
  const [activeLid, setActiveLid] = useState('');
  const [tab, setTab] = useState('calendar');
  const [dataLoading, setDataLoading] = useState(false);
  const [migrating, setMigrating] = useState(false);
  const [hasMigratable, setHasMigratable] = useState(false);
  const saveTimer = useRef(null);

  // Auth state
  useEffect(() => {
    return auth.onAuthStateChanged(async (u) => {
      setUser(u);
      if (u) {
        setDataLoading(true);
        try {
          const data = await fbLoadAll(u.uid);
          if (data.lizards.length > 0) {
            setLizards(data.lizards);
            setLogs(data.logs);
            setPhotoUrls(data.photoUrls || {});
            setActiveLid(data.lizards[0]?.id || '');
          } else {
            // 새 유저 — localStorage에 기존 데이터 있는지 확인
            const oldLizards = localStorage.getItem('llg_v2_lizards');
            if (oldLizards) {
              const parsed = JSON.parse(oldLizards);
              if (parsed && parsed.length > 0) setHasMigratable(true);
            }
          }
        } catch(e) {
          console.error(e);
        }
        setDataLoading(false);
      }
    });
  }, []);

  // Auto-save lizards & logs (debounced)
  useEffect(() => {
    if (!user || lizards.length === 0) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fbSaveLizards(user.uid, lizards).catch(console.error);
    }, 1000);
  }, [lizards]);

  useEffect(() => {
    if (!user) return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      fbSaveLogs(user.uid, logs).catch(console.error);
    }, 1000);
  }, [logs]);

  // Migrate from localStorage
  const migrate = async () => {
    setMigrating(true);
    try {
      const oldLizards = JSON.parse(localStorage.getItem('llg_v2_lizards') || '[]');
      const oldLogs = JSON.parse(localStorage.getItem('llg_v2_logs') || '{}');
      const oldPhotos = JSON.parse(localStorage.getItem('llg_v2_photos') || '{}');

      // Merge photos into logs
      Object.entries(oldPhotos).forEach(([lid, days]) => {
        Object.entries(days).forEach(([dkey, p]) => {
          if (!oldLogs[lid]) oldLogs[lid] = {};
          if (!oldLogs[lid][dkey]) oldLogs[lid][dkey] = {};
          if (p.photos) oldLogs[lid][dkey].photos = p.photos;
        });
      });

      setLizards(oldLizards);
      setLogs(oldLogs);
      setActiveLid(oldLizards[0]?.id || '');

      await fbSaveLizards(user.uid, oldLizards);
      await fbSaveLogs(user.uid, oldLogs);
      setHasMigratable(false);
    } catch(e) {
      alert('이전 중 오류가 발생했어요.');
    }
    setMigrating(false);
  };

  const activeLizard = lizards.find(l => l.id === activeLid) || lizards[0] || null;

  const onUpdate = useCallback((lid, dkey, patch) => {
    setLogs(prev => ({
      ...prev,
      [lid]: { ...prev[lid], [dkey]: { ...getLog(prev, lid, dkey), ...patch } }
    }));
  }, []);

  // Photo upload to Firebase Storage
  // 이미지 압축 함수 (Canvas 리사이즈)
  const compressImage = (file) => new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(resolve, 'image/jpeg', 0.75);
    };
    img.src = url;
  });

  const photoUrlsRef = useRef(photoUrls);
  useEffect(() => { photoUrlsRef.current = photoUrls; }, [photoUrls]);

  const onUploadPhotos = useCallback(async (lid, dkey, files) => {
    if (!user) return;
    try {
      // useRef로 항상 최신 photoUrls 참조 (stale closure 방지)
      const existingUrls = photoUrlsRef.current[lid]?.[dkey] || [];
      const remaining = 4 - existingUrls.length;
      const selected = Array.from(files).slice(0, remaining);
      if (!selected.length) return;
      const newUrls = [];
      for (let i = 0; i < selected.length; i++) {
        const compressed = await compressImage(selected[i]);
        const idx = existingUrls.length + i;
        const ref = storage.ref(`users/${user.uid}/logs/${lid}/${dkey}/photo_${idx}_${Date.now()}`);
        const snapshot = await ref.put(compressed);
        // getDownloadURL을 snapshot에서 직접 가져와서 타이밍 문제 방지
        const url = await snapshot.ref.getDownloadURL();
        newUrls.push(url);
      }
      const updated = [...existingUrls, ...newUrls];
      // 상태 먼저 업데이트
      setPhotoUrls(prev => ({
        ...prev,
        [lid]: { ...prev[lid], [dkey]: updated }
      }));
      // Firestore 저장
      await db.collection('users').doc(user.uid).set({
        photoUrls: { [lid]: { [dkey]: updated } }
      }, { merge: true });
    } catch(e) {
      console.error('사진 업로드 실패:', e);
      alert('사진 업로드에 실패했어요: ' + e.message);
    }
  }, [user]);

  const onDeletePhoto = useCallback(async (lid, dkey, idx) => {
    if (!user) return;
    const existingUrls = photoUrls[lid]?.[dkey] || [];
    // Delete from storage
    try {
      const ref = storage.ref(`users/${user.uid}/logs/${lid}/${dkey}/photo_${idx}`);
      await ref.delete();
    } catch(e) {}
    const updated = existingUrls.filter((_, i) => i !== idx);
    setPhotoUrls(prev => ({
      ...prev,
      [lid]: { ...prev[lid], [dkey]: updated }
    }));
    await db.collection('users').doc(user.uid).set({
      photoUrls: { [lid]: { [dkey]: updated } }
    }, { merge: true });
  }, [user, photoUrls]);

  // Lizard photo upload
  const onUploadLizardPhoto = useCallback(async (lizardId, file) => {
    if (!user || !file) return;
    const ref = storage.ref(`users/${user.uid}/lizards/${lizardId}/photo`);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    setLizards(prev => prev.map(l => l.id === lizardId ? {...l, photo: url} : l));
  }, [user]);

  const prevMonth = () => { if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1); };
  const nextMonth = () => { if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1); };

  const NAV = [
    { id:"calendar", label:"캘린더", icon:(active)=>(
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?C.text:C.textLight} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/>
        <line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>
        <circle cx="8" cy="14" r="1" fill={active?C.text:C.textLight}/>
        <circle cx="12" cy="14" r="1" fill={active?C.text:C.textLight}/>
        <circle cx="16" cy="14" r="1" fill={active?C.text:C.textLight}/>
      </svg>
    )},
    { id:"diary", label:"일기", icon:(active)=>(
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?C.text:C.textLight} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        <line x1="10" y1="9" x2="8" y2="9"/>
      </svg>
    )},
    { id:"stats", label:"통계", icon:(active)=>(
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?C.text:C.textLight} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
    )},
    { id:"manage", label:"호적", icon:(active)=>(
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?C.text:C.textLight} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    )},
  ];

  // Auth loading
  if (user === undefined || dataLoading) return <LoadingScreen message="불러오는 중..."/>;
  if (!user) return <LoginScreen onLogin={()=>{}}/>;

  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:FB,color:C.text,maxWidth:430,margin:"0 auto",paddingBottom:72}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        *{box-sizing:border-box;}
        body{margin:0;background:#f0f4ee;}
        input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
        input:focus,textarea:focus{outline:none;}
        ::-webkit-scrollbar{display:none;}
      `}</style>

      {/* 기존 데이터 마이그레이션 배너 */}
      {hasMigratable && (
        <div style={{background:C.accentDark,padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div style={{fontSize:12,color:"#fff",fontFamily:FB,lineHeight:1.5}}>기존 기록이 있어요.<br/>불러올까요?</div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={migrate} disabled={migrating}
              style={{background:"#fff",color:C.accentDark,border:"none",borderRadius:6,padding:"6px 14px",fontSize:12,cursor:"pointer",fontFamily:FB,fontWeight:600}}>
              {migrating ? "이전 중..." : "불러오기"}
            </button>
            <button onClick={()=>setHasMigratable(false)}
              style={{background:"transparent",color:"rgba(255,255,255,0.7)",border:"1px solid rgba(255,255,255,0.3)",borderRadius:6,padding:"6px 10px",fontSize:12,cursor:"pointer",fontFamily:FB}}>
              무시
            </button>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{background:C.bg,padding:"14px 20px 10px",position:"sticky",top:0,zIndex:100,borderBottom:`1px solid ${C.border}`}}>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2,alignItems:"center"}}>
          {lizards.map(l=>(
            <button key={l.id} onClick={()=>setActiveLid(l.id)}
              style={{flexShrink:0,background:activeLid===l.id?C.text:C.surface,color:activeLid===l.id?C.surface:C.textMuted,border:`1px solid ${activeLid===l.id?C.text:C.border}`,borderRadius:6,padding:"6px 16px",fontSize:13,cursor:"pointer",fontFamily:FT,fontWeight:activeLid===l.id?600:400,letterSpacing:"0.02em",transition:"all 0.15s"}}>
              {l.name}
            </button>
          ))}
          {lizards.length===0&&<span style={{fontSize:13,color:C.textMuted,padding:"7px 4px",fontFamily:FT}}>호적 탭에서 추가해주세요</span>}
          {/* 로그아웃 */}
          <button onClick={()=>auth.signOut()} style={{marginLeft:"auto",flexShrink:0,background:"none",border:"none",fontSize:11,color:C.textLight,cursor:"pointer",fontFamily:FB}}>
            로그아웃
          </button>
        </div>
      </div>

      {/* Views */}
      {tab==="calendar"&&<CalendarView lizards={lizards} logs={logs} photoUrls={photoUrls} activeLizard={activeLizard} onUpdate={onUpdate} onUploadPhotos={onUploadPhotos} onDeletePhoto={onDeletePhoto} calYear={calYear} calMonth={calMonth} prevMonth={prevMonth} nextMonth={nextMonth} setLizards={setLizards}/>}
      {tab==="diary"&&<DiaryView lizards={lizards} logs={logs} photoUrls={photoUrls} activeLizard={activeLizard}/>}
      {tab==="stats"&&<StatsView lizards={lizards} logs={logs} activeLizard={activeLizard} calYear={calYear} calMonth={calMonth} prevMonth={prevMonth} nextMonth={nextMonth}/>}
      {tab==="manage"&&<ManageView lizards={lizards} setLizards={setLizards} activeLid={activeLid} setActiveLid={setActiveLid} onUploadLizardPhoto={onUploadLizardPhoto}/>}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"rgba(240,244,238,0.96)",backdropFilter:"blur(16px)",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:200,paddingBottom:"max(env(safe-area-inset-bottom), 12px)"}}>
        {NAV.map(n=>(
          <button key={n.id} onClick={()=>setTab(n.id)}
            style={{flex:1,background:"none",border:"none",padding:"10px 0 6px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,color:tab===n.id?C.text:C.textLight,fontFamily:FB,transition:"color 0.15s"}}>
            {n.icon(tab===n.id)}
            <span style={{fontSize:10,fontWeight:tab===n.id?600:400,letterSpacing:"0.03em"}}>{n.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
